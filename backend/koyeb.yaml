name: borsvy-backend
services:
  - name: backend
    working_directory: /workspace
    build:
      command: mvn clean package -DskipTests -Dmaven.test.skip=true -Dmaven.javadoc.skip=true -Dmaven.source.skip=true
    run:
      command: java -jar target/backend-0.0.1-SNAPSHOT.jar
    ports:
      - port: 8080
        protocol: http
    env:
      - name: SPRING_PROFILES_ACTIVE
        value: production
      - name: SPRING_DATASOURCE_URL
        value: ${POSTGRESQL_URL}
      - name: SPRING_DATASOURCE_USERNAME
        value: ${POSTGRESQL_USERNAME}
      - name: SPRING_DATASOURCE_PASSWORD
        value: ${POSTGRESQL_PASSWORD}
      - name: JWT_SECRET
        value: ${JWT_SECRET}
      - name: MAVEN_OPTS
        value: "-Dmaven.repo.local=/tmp/m2/repository" 