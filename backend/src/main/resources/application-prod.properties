# Server settings
server.port=${PORT:8080}
server.address=0.0.0.0

# Database settings
# Defaults keep the single-VPS deployment bootable. Override these with
# DATABASE_URL/DB_DRIVER/DB_DIALECT/DB_USERNAME/DB_PASSWORD for PostgreSQL.
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:/var/lib/borsvy/borsvy;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
external-api.connect-timeout-ms=${EXTERNAL_API_CONNECT_TIMEOUT_MS:3000}
external-api.read-timeout-ms=${EXTERNAL_API_READ_TIMEOUT_MS:5000}

# Flyway
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.locations=classpath:db/migration

# JPA optimizations
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true
spring.jpa.properties.hibernate.generate_statistics=false

# JWT
jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXZlcnktbG9uZy1zZWNyZXQta2V5LWZvci1ib3JzdnktcHJvZA==}
jwt.expiration-ms=604800000

# Mail
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Stripe
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
stripe.pro-price-id=${STRIPE_PRO_PRICE_ID:}

# API Keys
finnhub.api.key=${FINNHUB_API_KEY:}
twelvedata.api.key=${TWELVEDATA_API_KEY:}
newsdata.api.key=${NEWSDATA_API_KEY:}
groq.api.key=${GROQ_API_KEY:fallback}
rapidapi.api.key=${RAPIDAPI_API_KEY:}
rapidapi.api.host=${RAPIDAPI_API_HOST:yahoo-finance166.p.rapidapi.com}

# Logging settings
logging.level.root=WARN
logging.level.com.borsvy=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# CORS settings for Hetzner/Nginx deployment
spring.web.cors.allowed-origins=${ALLOWED_ORIGINS:*}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# VPS runtime limits
server.tomcat.max-threads=20
server.tomcat.min-spare-threads=5
server.tomcat.max-connections=100
server.compression.enabled=true
