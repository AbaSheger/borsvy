name: Deploy to Hetzner

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hetzner-deploy
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run Playwright tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Compile backend
        working-directory: backend
        run: |
          chmod +x ./mvnw
          ./mvnw -q -DskipTests compile

  deploy:
    name: Deploy
    needs: verify
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist

      - name: Upload frontend artifact to Hetzner
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: ${{ secrets.HETZNER_SSH_PORT || '22' }}
          source: frontend-dist
          target: /tmp

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: ${{ secrets.HETZNER_SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -e

            APP_DIR="${{ vars.HETZNER_APP_DIR || '/var/www/borsvy' }}"
            FRONTEND_DIR="${{ vars.HETZNER_FRONTEND_DIR || '/var/www/borsvy-frontend' }}"
            BACKEND_SERVICE="${{ vars.HETZNER_BACKEND_SERVICE || 'borsvy.service' }}"
            BRANCH="${{ vars.HETZNER_BRANCH || 'main' }}"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            if [ ! -d "$APP_DIR/.git" ]; then
              sudo mkdir -p "$(dirname "$APP_DIR")"
              sudo chown -R "$USER:$USER" "$(dirname "$APP_DIR")"
              git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
            else
              cd "$APP_DIR"
              git fetch origin "$BRANCH"
              git reset --hard "origin/$BRANCH"
            fi

            cd "$APP_DIR/backend"
            chmod +x ./mvnw
            ./mvnw clean package -DskipTests
            sudo systemctl restart "$BACKEND_SERVICE"

            sudo mkdir -p "$FRONTEND_DIR"
            sudo rsync -a --delete /tmp/frontend-dist/ "$FRONTEND_DIR/"
            rm -rf /tmp/frontend-dist

            sudo nginx -t
            sudo systemctl reload nginx
