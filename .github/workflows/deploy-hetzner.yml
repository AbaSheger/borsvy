name: Deploy to Hetzner

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hetzner-deploy
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run Playwright tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Package backend
        working-directory: backend
        run: |
          chmod +x ./mvnw
          ./mvnw -q -DskipTests package

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: |
            backend/target/*.jar
            !backend/target/*.original

  deploy:
    name: Deploy
    needs: verify
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend-jar

      - name: Upload frontend artifact to Hetzner
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: ${{ secrets.HETZNER_SSH_PORT || '22' }}
          source: frontend-dist
          target: /tmp

      - name: Upload backend artifact to Hetzner
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: ${{ secrets.HETZNER_SSH_PORT || '22' }}
          source: backend-jar
          target: /tmp

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: ${{ secrets.HETZNER_SSH_PORT || '22' }}
          script: |
            set -euxo pipefail

            FRONTEND_DIR="${{ vars.HETZNER_FRONTEND_DIR || '/var/www/borsvy-frontend' }}"
            BACKEND_SERVICE="${{ vars.HETZNER_BACKEND_SERVICE || 'borsvy.service' }}"

            test -d /tmp/backend-jar
            ls -la /tmp/backend-jar
            JAR_PATH="$(find /tmp/backend-jar -type f -name '*.jar' ! -name '*.original' | head -n 1)"
            test -n "$JAR_PATH"
            sudo cp "$JAR_PATH" /root/backend-0.0.1-SNAPSHOT.jar
            sudo chmod 644 /root/backend-0.0.1-SNAPSHOT.jar
            rm -rf /tmp/backend-jar

            sudo mkdir -p /var/lib/borsvy
            sudo systemctl status "$BACKEND_SERVICE" --no-pager || true
            sudo systemctl restart "$BACKEND_SERVICE"
            for attempt in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:8080/api/health >/dev/null; then
                break
              fi
              if [ "$attempt" -eq 30 ]; then
                sudo journalctl -u "$BACKEND_SERVICE" -n 120 --no-pager
                exit 1
              fi
              sleep 2
            done
            sudo systemctl status "$BACKEND_SERVICE" --no-pager

            test -d /tmp/frontend-dist
            ls -la /tmp/frontend-dist
            sudo mkdir -p "$FRONTEND_DIR"
            sudo rsync -a --delete /tmp/frontend-dist/ "$FRONTEND_DIR/"
            rm -rf /tmp/frontend-dist

            sudo nginx -t
            sudo systemctl reload nginx
