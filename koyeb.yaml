name: borsvy
services:
  - name: frontend
    working_directory: frontend
    build:
      command: npm install && npm run build
    ports:
      - port: 3000
        protocol: http
    env:
      - name: NODE_ENV
        value: production
      - name: VITE_API_URL
        value: ${API_URL}

  - name: backend
    working_directory: backend
    build:
      command: mvn clean package -DskipTests
    ports:
      - port: 8080
        protocol: http
    env:
      - name: SPRING_PROFILES_ACTIVE
        value: prod
      - name: SERVER_PORT
        value: "8080" 